{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Documents Management</h2>

<div class="card p-4 shadow mb-4">

    <h4>Upload Document</h4>

    <form method="post" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-primary">
            Upload
        </button>

    </form>

</div>

<div class="card p-4 shadow">

    <h4>Uploaded Documents</h4>

    <table class="table table-bordered table-hover">

        <tr>
            <th>ID</th>
            <th>Document Name</th>
            <th>Uploaded Date</th>
            <th>Action</th>
        </tr>

        {% for f in files %}

        <tr>
            <td>{{ f.id }}</td>
            <td>{{ f.file.name }}</td>
            <td>{{ f.uploaded_at }}</td>

            <td>
                <a href="{{ f.file.url }}"
                   target="_blank"
                   class="btn btn-success btn-sm">
                   View
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
